name: Release

# Publishes the ONE npm package an app repo imports to author its deploy surface: `vozka-config`
# (packages/config). Nothing else is published — @vozka/core (the CLI) is baked into the runner image,
# and worker/runner/dashboard are the vozka app itself. Triggered by a `v*` tag.
#
# CI publishes via npm trusted publishing — OIDC, no token, automatic provenance. The FIRST publish of
# a brand-new package name can NOT use OIDC (npm has no "pending publisher": the trusted-publisher
# config is per-package and the package must exist first — npm/cli#8544), so v0.0.1 is published ONCE
# locally (`cd packages/config && npm publish --access public`). After that, configure the trusted
# publisher on npmjs.com (vozka-config → Settings → GitHub Actions: repo `contember/vozka`, workflow
# `release.yml`), and every later `v*` tag publishes token-less via this workflow.

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for trusted publishing + provenance
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 24's bundled npm may be older.
      - name: Update npm
        run: npm install -g npm@latest

      # Gate the publish on the same checks as CI — never ship a broken package.
      - name: Lint
        run: bun run lint
      - name: Format check
        run: bun run format:check
      - name: Type check
        run: bun run typecheck
      - name: Test
        run: bun test

      - name: Publish vozka-config to npm
        working-directory: packages/config
        # Token-less via the configured trusted publisher (OIDC); provenance is automatic.
        run: npm publish --provenance --access public
