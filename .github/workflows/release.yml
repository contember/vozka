name: Release

# Publishes the ONE npm package an app repo imports to author its deploy surface: `vozka-config`
# (packages/config). Nothing else is published — @vozka/core (the CLI) is baked into the runner image,
# and worker/runner/dashboard are the vozka app itself. Triggered by a `v*` tag.
#
# Steady state: trusted publishing via OIDC — no token, automatic provenance. The FIRST publish of a
# brand-new package name can NOT use OIDC (npm has no "pending publisher": the trusted-publisher config
# is per-package and the package must exist first — npm/cli#8544). So bootstrap ONCE:
#   1. add a temporary `NPM_TOKEN` repo secret (a granular token with publish rights for `vozka-config`)
#   2. push `v0.0.1` → this workflow publishes via that token (provenance still attaches via id-token)
#   3. on npmjs.com → vozka-config → Settings → add a GitHub Actions trusted publisher
#        (repo `contember/vozka`, workflow `release.yml`)
#   4. delete the `NPM_TOKEN` secret — every later `v*` tag then publishes token-less via OIDC

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for trusted publishing + provenance
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 24's bundled npm may be older.
      - name: Update npm
        run: npm install -g npm@latest

      # Gate the publish on the same checks as CI — never ship a broken package.
      - name: Lint
        run: bun run lint
      - name: Format check
        run: bun run format:check
      - name: Type check
        run: bun run typecheck
      - name: Test
        run: bun test

      - name: Publish vozka-config to npm
        working-directory: packages/config
        # Token-less once a trusted publisher is configured; NODE_AUTH_TOKEN is used only for the
        # one-time bootstrap publish (empty/unset afterward → OIDC takes over). Provenance is automatic.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
