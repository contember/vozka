name: platform

# Deploys the {{ACCOUNT}} account's vozka control-plane BASE: vozka-runner (the deploy executor) + vozka
# (the control plane). THIS repo is the per-account root of trust — it deploys vozka so vozka never has to
# deploy itself. Idempotent: re-run for a first bring-up OR a routine redeploy. The concrete apps (poplach,
# revizor, …) deploy THROUGH vozka, not here.
#
# Generated + maintained by `vozka init {{ACCOUNT}}`. Secrets + variables live in the `{{ACCOUNT}}` GitHub
# Environment (Settings → Environments → {{ACCOUNT}}) and are written there by the CLI — don't hand-edit them.
#
# contember/vozka is PUBLIC, so it's checked out tokenless. The vozka version this account runs is pinned in
# `vozka.ref` (bump it + push to roll out a new base).

on:
  workflow_dispatch:
    inputs:
      build_runner_image:
        description: Build + push the runner image (FIRST bring-up on this account, or a deliberate rebuild)
        type: boolean
        default: false
  push:
    branches: [main]
    # Only a version bump (or a workflow edit) redeploys — not a README tweak.
    paths: ['vozka.ref', '.github/workflows/platform.yml']

concurrency:
  group: platform-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Secrets + variables resolve from this GitHub Environment (created + populated by `vozka init`).
    environment: {{ACCOUNT}}
    steps:
      - name: Checkout this repo (base config + pinned ref)
        uses: actions/checkout@v5

      - name: Resolve pinned vozka ref
        id: ref
        run: echo "ref=$(tr -d '[:space:]' < vozka.ref)" >> "$GITHUB_OUTPUT"

      - name: Checkout contember/vozka@${{ steps.ref.outputs.ref }}
        uses: actions/checkout@v5
        with:
          repository: contember/vozka
          ref: ${{ steps.ref.outputs.ref }}
          path: vozka

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # wrangler launches under Node even via Bun and needs Node 22+.
      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install
        working-directory: vozka
        run: bun install

      # The deploy engine spawns a BARE `wrangler` (Bun.spawn), so the workspace bins must be on PATH.
      - name: Put workspace bins on PATH
        working-directory: vozka
        run: |
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
          echo "$PWD/packages/worker/node_modules/.bin" >> "$GITHUB_PATH"
          echo "$PWD/packages/runner/node_modules/.bin" >> "$GITHUB_PATH"

      # ── Stage 1 — propustka (root authz) ─────────────────────────────────────────────────────────────
      # DEFERRED (Phase B): propustka's deploy is being refactored. Once it lands, wire propustka's deploy
      # HERE (this repo OWNS the root-of-trust deploy) — it SEEDS the operator-generated provisioning key
      # (PROPUSTKA_CLIENT_ID/_SECRET) that Stage 2 then uses. Until then, point those at a key the live
      # propustka already accepts.

      # ── Stage 2 — vozka platform (executor + control plane) ──────────────────────────────────────────
      - name: Deploy vozka-runner + vozka (platform deploy)
        working-directory: vozka
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          VOZKA_VAULT_KEY: ${{ secrets.VOZKA_VAULT_KEY }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
          PROPUSTKA_CLIENT_ID: ${{ secrets.PROPUSTKA_CLIENT_ID }}
          PROPUSTKA_CLIENT_SECRET: ${{ secrets.PROPUSTKA_CLIENT_SECRET }}
          # Non-secret config (Environment Variables).
          VOZKA_DOMAIN: ${{ vars.VOZKA_DOMAIN }}
          GITHUB_APP_ID: ${{ vars.GITHUB_APP_ID }}
          PROPUSTKA_URL: ${{ vars.PROPUSTKA_URL }}
          VOZKA_BOOTSTRAP_ADMINS: ${{ vars.VOZKA_BOOTSTRAP_ADMINS }}
        run: |
          BUILD_FLAG=""
          if [ "${{ inputs.build_runner_image }}" = "true" ]; then BUILD_FLAG="--build-runner-image"; fi
          bun packages/core/src/cli.ts platform deploy \
            --runner-config=packages/runner/vozka-runner.config.ts \
            --worker-config=packages/worker/vozka.config.ts \
            $BUILD_FLAG

      - name: Summary
        if: always()
        run: |
          {
            echo "### platform deploy → {{ACCOUNT}}"
            echo ""
            echo "- vozka ref: \`${{ steps.ref.outputs.ref }}\`"
            echo "- build runner image: \`${{ inputs.build_runner_image || 'false' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
